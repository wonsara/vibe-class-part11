<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
   <div>
        <button type="button" onclick="getResult();">값출력</button>

        <p id="numbers"></p>
        
    </div>

    <script>

        function getResult() {

            const randVal = Math.floor(Math.random() * 20) + 1; // 1 ~ 20사이 랜덤값
            const pTag = document.querySelector('#numbers');
            pTag.textContent = `${randVal} 나이`;

       if(randVal >= 18) {
            alert('나이 : ' + randVal + ', 성인');
        }
        else if(randVal >= 13) {
            alert(`나이 : ${randVal}, 청소년`);
        }
        else if(randVal >= 13) {
            alert(`나이 : ${randVal}, 어린이`);
        }
   }
    </script>
</body>

</html>
