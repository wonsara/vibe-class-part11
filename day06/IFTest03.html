<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <button type="button" onclick="getResult();">확인</button>    
    </div>

    <script>

        function getResult() {

            const age = Math.floor(Math.random() * 20) + 1; // 1~ 20사이 랜덤값
        
            if(age >= 18) {
                alert(age + "세 : 성인");
            }
            else if(age >= 13) {
                alert(age + "세 : 청소년");
            }
             else {
                alert(age + "세 : 어린이");
            }
        }
    </script>
</body>

</html>
